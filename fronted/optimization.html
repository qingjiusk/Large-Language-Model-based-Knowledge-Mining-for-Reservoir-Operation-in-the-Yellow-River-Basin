<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HydroBrain — 优化调度数据</title>
<link rel="stylesheet" href="css/styles.css">
<style>
    :root { --opt-bg: #1a1f2e; --opt-card: #242b3d; --opt-accent: #11abb0; --opt-text: #d8dce6; --opt-muted: #8892a4; }
    body { background: var(--opt-bg); color: var(--opt-text); font-family: Manrope,sans-serif; margin: 0; padding: 0; }
    .opt-header { background: linear-gradient(135deg, #0f1923 0%, #1a2d3d 100%); padding: 40px 0 30px; text-align: center; border-bottom: 1px solid #2a3344; }
    .opt-header h1 { font-size: 2rem; margin: 0; color: #fff; }
    .opt-header h1 span { color: var(--opt-accent); }
    .opt-header p { color: var(--opt-muted); margin: 8px 0 0; font-size: 0.95rem; }
    .opt-container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
    /* Selector */
    .reservoir-selector { display: flex; gap: 12px; align-items: center; margin-bottom: 30px; flex-wrap: wrap; }
    .reservoir-selector select { flex: 1; min-width: 280px; padding: 12px 16px; background: var(--opt-card); color: #fff; border: 1px solid #3a4455; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    .reservoir-selector button { padding: 12px 28px; background: var(--opt-accent); color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity .2s; }
    .reservoir-selector button:hover { opacity: .85; }
    .reservoir-selector button:disabled { opacity: .4; cursor: not-allowed; }
    /* Cards */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 24px; }
    .card { background: var(--opt-card); border-radius: 10px; padding: 20px; border: 1px solid #2a3344; }
    .card h3 { margin: 0 0 14px; font-size: 1.1rem; color: var(--opt-accent); border-bottom: 1px solid #2a3344; padding-bottom: 10px; }
    /* Meta */
    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .meta-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1e2533; }
    .meta-item .label { color: var(--opt-muted); font-size: .85rem; }
    .meta-item .value { color: #e0e6f0; font-weight: 600; font-size: .9rem; }
    /* Variables */
    .var-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1e2533; }
    .var-row .var-name { font-weight: 600; }
    .var-row .var-symbol { font-family: monospace; background: #1a2d3d; padding: 2px 8px; border-radius: 4px; color: var(--opt-accent); font-size: .9rem; }
    .var-row .var-bounds { color: var(--opt-muted); font-size: .85rem; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: .75rem; font-weight: 600; }
    .badge-inferred { background: #2d3a1f; color: #a8d86b; }
    .badge-maximize { background: #1f2d3a; color: #6bc5d8; }
    .badge-minimize { background: #3a1f2d; color: #d86b8a; }
    /* Constraints */
    .constr-row { padding: 12px 0; border-bottom: 1px solid #1e2533; }
    .constr-row .constr-name { font-weight: 600; margin-bottom: 4px; }
    .constr-row .constr-expr { font-family: 'Courier New', monospace; background: #1a2d3d; padding: 4px 10px; border-radius: 4px; display: inline-block; margin: 4px 0; color: #c8e675; }
    .constr-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 6px; }
    .constr-meta span { font-size: .8rem; color: var(--opt-muted); }
    .cat-tag { display: inline-block; padding: 1px 8px; border-radius: 4px; font-size: .75rem; background: #2d303a; color: #8899bb; }
    /* Parameters */
    .param-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
    .param-card { background: #1a2d3d; border-radius: 8px; padding: 14px; text-align: center; }
    .param-card .param-val { font-size: 1.4rem; font-weight: 700; color: var(--opt-accent); }
    .param-card .param-unit { font-size: .8rem; color: var(--opt-muted); }
    .param-card .param-label { font-size: .78rem; color: var(--opt-muted); margin-top: 4px; }
    /* Time series */
    .ts-table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    .ts-table th { text-align: left; color: var(--opt-muted); padding: 8px 10px; border-bottom: 2px solid #2a3344; font-weight: 600; }
    .ts-table td { padding: 8px 10px; border-bottom: 1px solid #1e2533; }
    /* Loading / Empty */
    .loading { text-align: center; padding: 60px; color: var(--opt-muted); }
    .loading .spinner { width: 40px; height: 40px; border: 3px solid #2a3344; border-top-color: var(--opt-accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 80px 20px; color: var(--opt-muted); }
    .empty p { margin: 8px 0; }
    .back-link { display: inline-block; margin-top: 12px; color: var(--opt-accent); text-decoration: none; font-size: .9rem; }
    .back-link:hover { text-decoration: underline; }
    .nav-row { display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>

<header class="opt-header">
    <div class="opt-container">
        <div class="nav-row">
            <a href="/" class="back-link">← 返回问答系统</a>
            <span style="color:var(--opt-muted);font-size:.85rem;">数据来源: Neo4j 知识图谱 · <span id="statusDot" style="color:#c8e675">●</span> <span id="statusText">就绪</span></span>
        </div>
        <h1>水库<span>优化调度</span>数据接口</h1>
        <p>从知识图谱中提取结构化约束、参数、目标函数候选 · 供优化算法直接消费</p>
    </div>
</header>

<div class="opt-container">

    <!-- 水库选择 -->
    <div class="reservoir-selector">
        <select id="reservoirSelect">
            <option value="">-- 选择水库 --</option>
        </select>
        <button id="loadBtn" onclick="loadFormulation()">提取优化数据</button>
    </div>

    <!-- 结果区域 -->
    <div id="resultArea"><div class="empty"><p>👆 请选择一座水库，然后点击「提取优化数据」</p><p style="font-size:.8rem;color:var(--opt-muted)">系统将自动从知识图谱中提取决策变量、约束条件、目标候选和物理参数</p></div></div>

</div>

<script>
const API_BASE = 'http://127.0.0.1:8000';

// ── 加载水库列表 ──
async function loadReservoirs() {
    try {
        const r = await fetch(`${API_BASE}/api/optimization/reservoirs`);
        const d = await r.json();
        const sel = document.getElementById('reservoirSelect');
        const data = d.data || [];
        data.forEach(res => {
            const opt = document.createElement('option');
            opt.value = res.id;
            opt.textContent = res.name;
            sel.appendChild(opt);
        });
        document.getElementById('statusText').textContent = `就绪 (${data.length}座水库)`;
    } catch(e) {
        document.getElementById('statusDot').style.color = '#f46036';
        document.getElementById('statusText').textContent = 'API 不可达';
    }
}
loadReservoirs();

// ── 加载优化问题 ──
async function loadFormulation() {
    const sel = document.getElementById('reservoirSelect');
    const rid = sel.value;
    if (!rid) return alert('请先选择水库');

    const resultArea = document.getElementById('resultArea');
    resultArea.innerHTML = '<div class="loading"><div class="spinner"></div><p>正在从知识图谱提取优化数据...</p></div>';
    document.getElementById('loadBtn').disabled = true;

    try {
        const r = await fetch(`${API_BASE}/api/optimization/formulate?reservoir_id=${encodeURIComponent(rid)}`);
        const d = await r.json();
        if (d.code !== 200) { resultArea.innerHTML = `<div class="empty"><p>❌ ${d.message}</p></div>`; return; }
        renderFormulation(d.data, d.message);
    } catch(e) {
        resultArea.innerHTML = `<div class="empty"><p>❌ 请求失败: ${e.message}</p><p style="font-size:.8rem">请确认主 API 服务已启动 (端口 8000)</p></div>`;
    }
    document.getElementById('loadBtn').disabled = false;
}

function renderFormulation(data, msg) {
    const meta = data.problem_meta || {};
    const vars = data.decision_variables || [];
    const constraints = data.constraints || [];
    const params = data.parameters || {};
    const objectives = data.objective_candidates || [];
    const ts = data.time_series || {};
    const rules = data.dispatch_rules || [];

    let html = '';

    // ── 元信息 ──
    html += `<div class="card" style="margin-bottom:20px">
        <div class="meta-grid">
            <div class="meta-item"><span class="label">水库</span><span class="value">${esc(meta.reservoir_name)}</span></div>
            <div class="meta-item"><span class="label">约束数</span><span class="value">${constraints.length}</span></div>
            <div class="meta-item"><span class="label">决策变量</span><span class="value">${vars.length}</span></div>
            <div class="meta-item"><span class="label">目标候选</span><span class="value">${objectives.length}</span></div>
            <div class="meta-item"><span class="label">时序数据</span><span class="value">${ts.count||0} 条</span></div>
            <div class="meta-item"><span class="label">调度规则</span><span class="value">${rules.length} 条</span></div>
        </div>
    </div>`;

    // ── 决策变量 + 参数 (并排) ──
    html += '<div class="card-grid">';

    // 决策变量
    html += '<div class="card"><h3>📐 决策变量 (推断)</h3>';
    if (vars.length === 0) {
        html += '<p style="color:var(--opt-muted)">未从约束中推断出决策变量</p>';
    } else {
        vars.forEach(v => {
            html += `<div class="var-row">
                <div>
                    <div class="var-name">${esc(v.name)} <span class="var-symbol">${esc(v.symbol)}</span></div>
                    <div style="font-size:.8rem;color:var(--opt-muted);margin-top:3px">${esc(v.inference_source||'')}</div>
                </div>
                <div class="var-bounds">
                    [${v.bounds?.lower??'?'}, ${v.bounds?.upper??'?'}] ${esc(v.unit)}
                </div>
            </div>`;
            html += `<div style="margin-top:6px"><span class="badge badge-inferred">推断</span></div>`;
        });
    }
    html += '</div>';

    // 物理参数
    html += '<div class="card"><h3>📊 物理参数</h3><div class="param-grid">';
    const paramLabels = {
        dead_storage_level: '死水位', normal_storage_level: '正常蓄水位',
        flood_control_level: '汛限水位', total_capacity: '总库容',
        flood_control_capacity: '防洪库容', active_capacity: '兴利库容'
    };
    let hasParams = false;
    Object.entries(paramLabels).forEach(([key, label]) => {
        const p = params[key];
        if (p && p.value != null) {
            hasParams = true;
            html += `<div class="param-card">
                <div class="param-label">${label}</div>
                <div class="param-val">${esc(String(p.value))}</div>
                <div class="param-unit">${esc(p.unit||'')}</div>
            </div>`;
        }
    });
    if (!hasParams) html += '<p style="color:var(--opt-muted)">暂无参数数据</p>';
    html += '</div></div></div>';

    // ── 约束条件 ──
    html += '<div class="card" style="margin-bottom:20px"><h3>🔒 约束条件</h3>';
    if (constraints.length === 0) {
        html += '<p style="color:var(--opt-muted)">未找到约束</p>';
    } else {
        constraints.forEach(c => {
            html += `<div class="constr-row">
                <div class="constr-name">${esc(c.id)}. ${esc(c.name)}</div>
                <div class="constr-expr">${esc(c.expression||'')}</div>
                <div class="constr-meta">
                    ${c.category?`<span class="cat-tag">${esc(c.category)}</span>`:''}
                    ${c.operator?`<span>运算符: ${esc(c.operator)}</span>`:''}
                    ${c.value!=null?`<span>值: ${c.value} ${esc(c.unit||'')}</span>`:''}
                    ${c.source_doc?`<span style="color:var(--opt-muted)">来源: ${esc(c.source_doc)}</span>`:''}
                </div>
            </div>`;
        });
    }
    html += '</div>';

    // ── 目标候选 + 时间序列 (并排) ──
    html += '<div class="card-grid">';

    html += '<div class="card"><h3>🎯 目标函数候选 (推断)</h3>';
    if (objectives.length === 0) {
        html += '<p style="color:var(--opt-muted)">未从约束中推断出目标函数</p>';
    } else {
        objectives.forEach(o => {
            const cls = o.type === 'maximize' ? 'badge-maximize' : 'badge-minimize';
            html += `<div style="padding:10px 0;border-bottom:1px solid #1e2533">
                <span class="badge ${cls}">${esc(o.type)}</span>
                <strong style="margin-left:8px">${esc(o.description)}</strong>
                <div style="font-size:.78rem;color:var(--opt-muted);margin-top:4px">关键词: ${(o.related_keywords||[]).join(', ')} · ${esc(o.source||'')}</div>
            </div>`;
        });
    }
    html += '</div>';

    // 时间序列
    html += '<div class="card"><h3>📈 水文时序数据</h3>';
    const entries = ts.entries || [];
    if (entries.length === 0) {
        html += '<p style="color:var(--opt-muted)">暂无时序数据</p>';
    } else {
        html += '<table class="ts-table"><thead><tr><th>时间</th><th>指标</th><th>数值</th><th>单位</th></tr></thead><tbody>';
        entries.forEach(e => {
            html += `<tr><td>${esc(String(e.label||e.year||''))}</td><td>${esc(String(e.indicator||''))}</td><td>${esc(String(e.value||''))}</td><td>${esc(String(e.unit||''))}</td></tr>`;
        });
        html += '</tbody></table>';
    }
    html += '</div></div>';

    // ── 调度规则 ──
    if (rules.length > 0) {
        html += '<div class="card" style="margin-bottom:20px"><h3>📋 调度规则</h3>';
        rules.forEach(rule => {
            html += `<div style="padding:10px 0;border-bottom:1px solid #1e2533">
                <strong>${esc(rule.name||'')}</strong>
                ${rule.content?`<p style="margin:6px 0;color:var(--opt-muted)">${esc(rule.content)}</p>`:''}
                ${rule.applicable_period?`<span class="cat-tag">${esc(rule.applicable_period)}</span>`:''}
            </div>`;
        });
        html += '</div>';
    }

    document.getElementById('resultArea').innerHTML = html;
}

function esc(s) {
    if (s == null) return '';
    const d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
}
</script>
</body>
</html>
